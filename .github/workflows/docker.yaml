# CR-019 §9 — docker / CVE scan CI workflow.
#
# Runs the docker + cve_scan-marked tests that the default `ci.yaml`
# workflow excludes. Triggered manually via `workflow_dispatch` so
# the operator opts in (the container build + CVE scan take ~5 min
# of runner time each and aren't useful on every PR).
#
# Three jobs:
#   container-runtime — exercises the running container's surface
#     (live HTTP + healthcheck + tmpfs / read-only-fs invariants).
#   container-reproducibility — rebuilds the image twice and asserts
#     the digest matches (REQ_NF_FAS_002).
#   cve-scan — runs whatever CVE scanner the runner has (trivy /
#     grype / docker scout); fails on fixable HIGH/CRITICAL CVEs.
#
# The CVE allow-list lives at `Documentations/CVE-Allowlist.md` —
# every entry SHALL carry a justification + a re-review date.

name: docker

on:
  workflow_dispatch:
    inputs:
      run_cve_scan:
        description: "Also run the CVE scan job"
        required: false
        type: boolean
        default: true
  schedule:
    # Weekly Monday 06:00 UTC — picks up upstream CVE database
    # updates without operator action.
    - cron: "0 6 * * 1"

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  container-runtime:
    name: container runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install -e . --no-deps

      - name: Run docker-marked tests
        # The Dockerfile + compose.yaml live at repo root per CR-017.
        # The runtime tests build the image, start a container, hit
        # /health, exercise the read-only / tmpfs invariants, then
        # tear down.
        run: |
          pytest tests/webapp/test_dockerfile.py \
                 tests/webapp/test_container_runtime_smoke.py \
                 tests/webapp/test_container_reproducibility.py \
                 -q --no-header --strict-markers -m docker

  cve-scan:
    name: CVE scan
    if: ${{ github.event.inputs.run_cve_scan != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: container-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install -e . --no-deps

      - name: Install Trivy
        # The test discovers `trivy`/`grype`/`docker scout` on the
        # runner; we install Trivy so the run is deterministic.
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run CVE scan tests
        run: |
          pytest tests/webapp/test_container_cve_scan.py \
                 -q --no-header --strict-markers -m "docker and cve_scan"
