# CR-019 §9 — main CI workflow.
#
# Runs on every push + PR against main. Three stages:
#   1. install — set up Python + install the runtime + dev dependency
#      groups from requirements.lock so the run is byte-deterministic
#      across actors.
#   2. validate — fast static checks (the structural audits + the
#      traceability --check guard + the OpenAPI snapshot guard).
#   3. test — pytest over the full suite excluding the docker /
#      cve_scan markers (those run via the docker.yaml workflow on
#      manual dispatch). Coverage HTML is generated as part of this
#      step + uploaded as a GitHub Pages artifact.
#   4. deploy-pages — publishes the coverage HTML report to GitHub
#      Pages. Only runs on push to main (skipped on PRs).
#
# Docker / CVE-scan tests are intentionally NOT part of the default
# matrix — they need a docker daemon + a CVE scanner that GitHub's
# hosted runners may or may not have. The dedicated workflow runs
# on `workflow_dispatch` so the operator triggers it from the
# Actions tab.
#
# Concurrency: cancel stale runs on the same ref so a fast follow-up
# push doesn't queue a long-running run behind it.

name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate-and-test:
    name: validate + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The wiki lives as a git submodule under Documentations/.
          # The traceability tool reads it; without recursing the
          # checkout the --check fails on missing source files.
          submodules: recursive

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies from requirements.lock
        run: |
          python -m pip install --upgrade pip
          # The lock pins the runtime + webapp extra surfaces with
          # cryptographic hashes for byte-deterministic CI runs.
          pip install --require-hashes -r requirements.lock
          # Runtime + extras the lock pins (no-deps so the install
          # doesn't try to resolve transitive deps the lock already
          # pinned).
          pip install -e . --no-deps
          # Test-only deps (hypothesis / pytest-bdd / pytest-benchmark)
          # + reports extras (plotly / kaleido) + metrics extras
          # (prometheus_client) + settings extras (ruamel.yaml)
          # live in pyproject's optional extras. Install them
          # un-pinned for CI so the property + BDD +
          # analytics-report + metrics + settings tests can
          # collect without ImportError. The runtime + webapp
          # lock remains the hash-pinned production target;
          # these are CI-only.
          pip install -e ".[dev,reports,metrics,settings]"

      - name: Structural audits
        run: |
          # The structural audits + the conformance suite catch
          # boundary violations before pytest's main loop. Splitting
          # them out makes the failure obvious in the Actions UI.
          pytest \
            tests/conformance/ \
            tests/webapp/test_structural.py \
            tests/strategy_lab/quant/test_structural.py \
            tests/webapp/test_view_router_layout.py \
            -q --no-header --strict-markers

      - name: Traceability check
        # REQ_NF_TRC_001 — the matrix MUST be regenerated before
        # commit. The --check mode exits non-zero if the on-disk
        # CSV is stale relative to the wiki source.
        run: python tools/traceability-report.py --check

      - name: OpenAPI snapshot guard
        # REQ_F_FAS_004 — the committed snapshot MUST match the
        # live FastAPI app's generated schema. If a route changes,
        # the snapshot is regenerated as part of the PR (the
        # operator runs `python tools/regenerate_openapi_snapshot.py`
        # locally) and the wiki re-approval row is added.
        run: |
          pytest tests/webapp/test_openapi_stability.py -q --no-header

      - name: Full test suite (with coverage)
        run: |
          # Skip the docker / CVE-scan markers — those run in the
          # dedicated `docker.yaml` workflow on `workflow_dispatch`.
          # Also skip the wallclock-marked tests (multi-year drill,
          # long-horizon walk-forward) — they're operator-on-demand
          # validation drills (Validation.md §5), not per-PR gates.
          #
          # Coverage is collected against `trading_system/` (see
          # `[tool.coverage.run] source` in pyproject.toml); the
          # HTML report under `htmlcov/` becomes the GitHub Pages
          # artefact below.
          coverage run -m pytest \
            tests/ \
            --ignore=tests/webapp/test_container_runtime_smoke.py \
            --ignore=tests/webapp/test_container_cve_scan.py \
            --ignore=tests/webapp/test_container_reproducibility.py \
            -q --no-header --strict-markers \
            -m "not docker and not cve_scan and not wallclock"
          coverage report --skip-covered --skip-empty
          coverage html -d htmlcov

      - name: Upload pytest cache on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-cache
          path: .pytest_cache/
          retention-days: 7

      - name: Upload coverage HTML as Pages artifact
        # Only relevant on the main-branch push that actually
        # deploys. PRs skip this step + the deploy-pages job
        # because Pages publishes one URL per repo and racing
        # PRs would otherwise stomp each other.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: htmlcov

  deploy-pages:
    name: deploy coverage to GitHub Pages
    needs: validate-and-test
    # Only push-to-main runs the deploy. PRs skip this job
    # entirely — `needs:` triggers regardless, but the `if:`
    # filter on `github.event_name` makes the job no-op-skip.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
