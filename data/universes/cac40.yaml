# CAC 40 universe — all 40 official index constituents (validated
# Yahoo Finance tickers + ISINs).
#
# Includes the CAC 40 index itself (^FCHI) for hedging + performance
# comparison.
#
# Bundled fixtures ship only for the eu-dividend-starter trio —
# operators record real Yahoo data via tools/yfinance_recorder.py
# for other symbols, OR pick the "yfinance" bar source in the
# onboarding wizard to poll live with cached fallback.

name: cac40
description: |
  Complete CAC 40 index constituents (40 stocks + index).
  France's primary equity benchmark: large-cap, dividend-heavy,
  multi-sector exposure. Includes financials, industrials, luxury,
  energy, healthcare, utilities, and tech.

# Index itself for hedging and performance tracking.
indices:
  - id: ^FCHI
    symbol: ^FCHI
    description: CAC 40 Index
    currency: EUR

# CAC 40 stocks. Yahoo Finance symbols include the exchange
# suffix (.PA = Paris, .AS = Amsterdam, .HE = Helsinki). ISINs
# verified against Euronext / SIX listings.
