# SBF 120 universe — starter (CAC 40 + 30 widely-traded mid-caps).
#
# Status: PARTIAL — 70 stocks of the 120 official SBF 120
# constituents. The full SBF 120 list rotates quarterly; only ISINs
# that we can verify against Euronext / SIX have been included so
# replay-determinism (REQ_NF_DAT_001) holds bit-identically.
# Operators extending this universe SHALL verify each new (id,
# isin) pair before adding so a bad ticker doesn't poison the
# yfinance cache key.
#
# Includes the SBF 120 index itself (^SBF120) for hedging +
# performance comparison.

name: sbf120
description: |
  SBF 120 starter — France's primary mid-and-large-cap benchmark.
  Index covers the top 120 stocks on Euronext Paris by market cap +
  liquidity. This file ships the CAC 40 top tier (~40 stocks) plus
  a curated subset of large mid-caps (~30 stocks). The remainder
  (~50 names) is the operator's extension surface — add by ISIN
  via the same shape; the yfinance adapter caches per (symbol,
  timeframe, range).

# Index itself for hedging and performance tracking.
indices:
  - id: ^SBF120
    symbol: ^SBF120
    description: SBF 120 Index
    currency: EUR

