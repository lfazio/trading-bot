# SRD (Service de Règlement Différé) eligible universe — starter.
#
# Euronext Paris's deferred-monthly-settlement margin service. The
# eligibility list rotates quarterly; Euronext publishes the
# official list at
# https://www.euronext.com/en/products/equities/srd
#
# Status: PARTIAL — starter list of ~30 widely-traded SBF 120 names
# known to be SRD-eligible at most reviews. Operators extending this
# universe SHALL verify each new (id, isin) pair against the current
# Euronext publication before adding. The yfinance cache key is
# tied to (symbol, timeframe, range), so a typo poisons the cache
# until manual cleanup.
#
# The shape mirrors data/universes/cac40.yaml so the same
# UniverseLoader consumes both files; the CR-030 boot wiring
# loads this file once at process start and populates
# `trading_system.models.trading.SRD_ELIGIBLE_INSTRUMENT_IDS`.

name: srd-eligible
description: |
  SRD-eligible Paris stocks — starter list of widely-traded
  SBF 120 names with verified ISINs. Operators extend by
  consulting Euronext's quarterly SRD publication and adding
  validated (id, isin) entries below.

