# system.yaml — top-level run configuration
# Refs: REQ_F_CAP_001, REQ_F_BRK_004, REQ_O_003, REQ_SDS_INT_004,
#       REQ_SDD_API_004, REQ_SDS_ARC_005

system:
  starting_capital:
    amount: 1000          # REQ_F_CAP_001 — configurable; not hardcoded in source
    currency: EUR
  log_level: INFO
  seed: 0xCAFE            # REQ_SDS_ARC_005 — all randomness derives from this
  mode: backtest          # live | backtest | paper

broker:
  adapter: local          # REQ_F_BRK_004 — selects BrokerAdapter implementation.
                          # `local` -> LocalBrokerAdapter (in-process, deterministic;
                          # the only concrete adapter shipped through this lifecycle).
                          # Live-broker adapters are deferred (REQ_F_BRK_003).

data:
  # Demo-friendly defaults: the mock provider emits deterministic
  # synthetic bars + dividends for any requested date range so a
  # vanilla checkout + `pip install -e .` runs the demo + CI
  # without any external network, recorded cache, or fixture
  # date-window concerns.
  #
  # Operators with a populated yfinance cache override these by
  # editing this file locally (don't commit the override) or by
  # setting ``TRADING_BOT_CONFIG_DIR=/path/to/local-config``
  # (the webapp's ``_default_config_dir()`` honours the env var).
  # A typical operator override: ``provider: yfinance`` +
  # ``cache_root: var/yfinance-cache`` + ``universe: cac40`` +
  # ``bundled_fixtures: false`` (cache already populated by
  # ``tools/yfinance_recorder.py``).
  provider: mock
  cache_root: .cache/yfinance
  bundled_fixtures: true
  universe: ""
